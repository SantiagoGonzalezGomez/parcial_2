name: parcial_flutter
description: Aplicación universitaria - Parcial Flutter

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=2.17.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Estado
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # HTTP
  dio: ^5.4.3

  # Navegación
  go_router: ^13.2.0

  # Gráficas
  fl_chart: ^0.68.0

  # Loading skeleton
  skeletonizer: ^1.1.1

  # Imágenes
  image_picker: ^1.1.2

  # Variables de entorno
  flutter_dotenv: ^5.1.0

  # Utilidades
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.9
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - .env